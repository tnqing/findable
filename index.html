<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findable | Discover What Matters</title>
    <meta name="description"
        content="Findable - A premium experience to discover what truly matters. Explore the minimalist design and intuitive interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="glow-sphere"></div>

    <div class="page-wrapper">
        <header class="main-header">
            <div class="header-top">
                <div class="header-actions">
                    <div class="icon-btn profile-btn" title="Profile Settings">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-round"><path d="M18 20a6 6 0 0 0-12 0"/><circle cx="12" cy="10" r="4"/><circle cx="12" cy="12" r="10"/></svg>
                    </div>
                    <div class="icon-btn menu-btn" title="Menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                    </div>
                </div>
            </div>
            <div class="header-bottom">
                <div class="header-bottom-content">
                    <button class="icon-btn back-btn" id="header-back-btn" title="Back to Main">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <span class="header-label" id="main-guidance-msg">아래 설정 버튼을 눌러 최대 10개의 최애 카테고리를 설정해두시면 더 간편한 생활이 가능해집니다 :)</span>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="content-center">
                <div class="glass-card" id="main-content">
                    <h1 class="hero-text" id="findable-text">
                        <span style="--i:0">f</span>
                        <span style="--i:1">i</span>
                        <span style="--i:2">n</span>
                        <span style="--i:3">d</span>
                        <span style="--i:4">a</span>
                        <span style="--i:5">b</span>
                        <span style="--i:6">l</span>
                        <span style="--i:7">e</span>
                    </h1>
                    <div class="shimmer"></div>
                </div>

                <div class="settings-trigger-wrapper">
                    <button class="icon-btn settings-trigger" id="open-categories" title="Configure Categories">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <div class="selected-categories-display" id="selected-display">
                    <!-- Selected categories will appear here in two rows -->
                </div>
            </div>

            <!-- Category Selection Modal (Glassmorphism) -->
            <div class="category-modal-overlay" id="category-overlay">
                <div class="glass-card category-modal" id="category-box">
                    <h2 class="modal-title">카테고리 고르기</h2>
                    <p class="modal-subtitle">최대 10개까지 선택할 수 있습니다.</p>
                    <div class="category-grid" id="category-grid">
                        <!-- Categories injected via JS -->
                    </div>
                    <div class="modal-footer">
                        <button class="submit-btn" id="submit-categories" disabled>Submit</button>
                    </div>
                </div>
            </div>

            <!-- Content View Modal -->
            <div class="content-modal-overlay" id="content-overlay">
                <div class="glass-card content-modal" id="content-box">
                    <div class="content-modal-header">
                        <div class="header-left">
                            <span id="modal-category-name" class="selection-tag title-tag"></span>
                            <button class="icon-btn heart-filter-btn" id="filter-liked-btn" title="좋아요만 보기">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                            </button>
                            <button class="icon-btn add-btn" id="add-link-btn" title="링크 추가하기">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                            </button>
                        </div>
                        <div class="search-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            <input type="text" id="content-search" placeholder="저장된 링크 검색...">
                        </div>
                    </div>

                    <div class="content-scroll-area">
                        <!-- Top 10 Most Visited Section -->
                        <section class="content-section">
                            <h3 class="section-title">자주 찾는 링크 <span class="count-badge">Top 10</span></h3>
                            <div class="top-grid" id="top-links-grid">
                                <!-- Top 10 grid items injected via JS -->
                            </div>
                        </section>

                        <!-- All Links List Section -->
                        <section class="content-section">
                            <h3 class="section-title">모든 저장 목록</h3>
                            <div class="links-list" id="all-links-list">
                                <!-- List items injected via JS -->
                            </div>
                        </section>
                    </div>
                </div>
            </div>
            <!-- Add Link Modal -->
            <div class="add-link-overlay detail-modal-overlay" id="add-link-overlay">
                <div class="glass-card add-link-modal" id="add-link-box">
                    <h2 class="modal-title">링크 추가하기</h2>
                    <p class="modal-subtitle">저장하고 싶은 웹사이트 주소나 캡처 이미지를 추가하세요.</p>
                    <div class="add-options">
                        <div class="input-group">
                            <label class="input-label">웹사이트 링크</label>
                            <input type="text" id="new-link-url" placeholder="https://example.com" autocomplete="off">
                        </div>
                        <div class="modal-divider"><span>또는</span></div>
                        <div class="input-group">
                            <label class="input-label">화면 캡처 이미지</label>
                            <input type="file" id="new-image-upload" accept="image/*" class="file-input">
                            <label for="new-image-upload" class="file-upload-label">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-image"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                <span id="file-name-display">클릭하여 이미지 선택</span>
                            </label>
                        </div>
                        <div class="modal-divider"><span>또는</span></div>
                        <div class="input-group">
                            <label class="input-label">제목 (선택사항 - 비워두면 AI가 정해줘요)</label>
                            <input type="text" id="new-link-title" placeholder="직접 제목을 입력하고 싶을 때 쓰세요" autocomplete="off">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="submit-btn" id="save-link-btn">Save</button>
                    </div>
                </div>
            </div>

            <!-- Image Viewer Modal -->
            <div class="image-viewer-overlay detail-modal-overlay" id="image-viewer-overlay">
                <button class="close-viewer-btn" id="close-viewer-btn">&times;</button>
                <img id="viewer-img" src="" alt="Full size view">
            </div>

            <!-- AI Settings Modal -->
            <div class="add-link-overlay detail-modal-overlay" id="ai-settings-overlay">
                <div class="glass-card add-link-modal" id="ai-settings-box">
                    <h2 class="modal-title" style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        AI 제목 자동완성
                    </h2>
                    <p class="modal-subtitle">사진 내용과 웹사이트를 이해하고 똑똑한 제목을 달아주기 위해 Gemini API 키가 필요합니다.</p>
                    <div class="input-group">
                        <label class="input-label">Gemini API Key</label>
                        <input type="password" id="ai-api-key" placeholder="AI-XXXXXXXXXXXXXXXXXXXXXXX">
                    </div>
                    <div class="modal-footer">
                        <button class="submit-btn" id="save-ai-key-btn">키 저장하기</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- AI Settings Trigger Button (Floating Bottom Right) -->
        <button class="icon-btn ai-settings-trigger" id="ai-settings-btn" title="AI 설정">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bot"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </button>

        <footer class="main-footer">
            <p>&copy; 2026 Findable</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
